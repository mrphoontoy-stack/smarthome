<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE CARE - Grandma Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        @keyframes gradient-xy {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-xy {
            background-size: 400% 400%;
            animation: gradient-xy 15s ease infinite;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-100 to-teal-100 animate-gradient-xy p-4 min-h-screen text-slate-800 flex items-center justify-center">

    <div class="w-full max-w-7xl h-auto min-h-[90vh] glass-panel rounded-[2rem] md:rounded-[3rem] flex flex-col relative overflow-hidden my-4">
        
        <div id="sos-sent-banner" class="hidden absolute inset-0 z-50 bg-red-600/95 backdrop-blur-md text-white p-6 md:p-12 flex flex-col justify-center items-center text-center">
            <div class="text-7xl md:text-9xl mb-4 animate-pulse drop-shadow-2xl">🚨</div>
            <h2 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-wide drop-shadow-lg">กำลังเรียกให้คนมาช่วย!</h2>
            <p class="text-xl md:text-3xl font-medium mb-8 text-red-100">ระบบได้ส่งสัญญาณช่วยเหลือไปที่มือถือของผู้ดูแลแล้วจ้ะ รอสักครู่นะ</p>
            <button onclick="cancelSOS()" class="bg-white text-red-600 font-bold px-8 py-4 rounded-full text-xl md:text-3xl shadow-[0_10px_40px_rgba(255,255,255,0.3)] hover:bg-slate-100 transition-all duration-300">
                ยกเลิกการส่งสัญญาณ
            </button>
        </div>

        <header class="p-6 md:px-10 flex flex-col md:flex-row items-center justify-between shrink-0 border-b border-white/50 bg-white/30 gap-6">
            <div class="flex flex-col md:flex-row items-center gap-4 text-center md:text-left">
                <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-indigo-400 to-purple-400 p-1 shadow-lg shrink-0">
                    <div class="w-full h-full bg-white rounded-full overflow-hidden flex justify-center items-center">
                        <img src="https://cdn-icons-png.flaticon.com/512/4333/4333044.png" alt="Grandma Avatar" class="w-full h-full object-cover">
                    </div>
                </div>
                <div>
                    <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-purple-600 drop-shadow-sm">WE CARE</h1>
                    <p class="text-slate-600 text-lg md:text-xl font-bold mt-1 flex items-center justify-center md:justify-start gap-2">
                        สวัสดีจ้ะ, คุณยาย ❤️
                        <span class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold border border-indigo-200 shadow-sm">v 1.3</span>
                    </p>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row items-center gap-4">
                <div class="flex items-center gap-3 bg-white/60 px-5 py-2.5 rounded-full border border-white shadow-sm">
                    <span class="relative flex h-4 w-4">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-500"></span>
                    </span>
                    <span class="text-slate-700 font-bold text-sm md:text-md">ระบบออนไลน์</span>
                </div>
                <div class="flex gap-2">
                    <img src="3040_0.jpg" alt="KU KUSK" class="h-10 md:h-14 w-auto object-contain rounded-xl shadow-md border-2 border-white bg-white">
                    <img src="3039_0.jpg" alt="Robotics Playground" class="h-10 md:h-14 w-auto object-contain rounded-xl shadow-md border-2 border-white bg-white">
                </div>
            </div>
        </header>

        <main class="flex-1 p-4 md:p-8 flex flex-col lg:flex-row gap-8">
            
            <div class="flex-1 flex flex-col gap-4">
                <div class="flex items-center justify-center md:justify-start gap-3 px-2">
                    <span class="text-2xl md:text-3xl">🏠</span>
                    <h2 class="text-xl md:text-2xl font-bold text-slate-700">ควบคุมห้องของยาย</h2>
                </div>
                
                <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 flex-1">
                    <button onclick="toggleDevice('light')" class="glass-button active:scale-95 hover:-translate-y-1 text-amber-600 p-6 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300">
                        <div class="w-16 h-16 md:w-20 md:h-20 bg-amber-100 rounded-full flex items-center justify-center mb-4 shadow-inner">
                            <span class="text-4xl md:text-5xl">💡</span>
                        </div>
                        <span class="text-lg md:text-xl font-extrabold text-slate-800">ไฟห้อง</span>
                        <span class="bg-slate-100 px-4 py-1.5 rounded-full text-[10px] md:text-xs mt-3 font-bold border border-slate-200" id="light-status">สถานะ: ปิด 🔴</span>
                    </button>
                    
                    <button onclick="toggleDevice('water')" class="glass-button active:scale-95 hover:-translate-y-1 text-emerald-600 p-6 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300">
                        <div class="w-16 h-16 md:w-20 md:h-20 bg-emerald-100 rounded-full flex items-center justify-center mb-4 shadow-inner">
                            <span class="text-4xl md:text-5xl">🌱</span>
                        </div>
                        <span class="text-lg md:text-xl font-extrabold text-slate-800">รดน้ำต้นไม้</span>
                        <span class="bg-slate-100 px-4 py-1.5 rounded-full text-[10px] md:text-xs mt-3 font-bold border border-slate-200" id="water-status">สถานะ: ปิด 🔴</span>
                    </button>

                    <button onclick="toggleDevice('fan')" class="col-span-2 lg:col-span-1 glass-button active:scale-95 hover:-translate-y-1 text-sky-600 p-6 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300">
                        <div class="w-16 h-16 md:w-20 md:h-20 bg-sky-100 rounded-full flex items-center justify-center mb-4 shadow-inner">
                            <span class="text-4xl md:text-5xl">🌀</span>
                        </div>
                        <span class="text-lg md:text-xl font-extrabold text-slate-800">พัดลม</span>
                        <span class="bg-slate-100 px-4 py-1.5 rounded-full text-[10px] md:text-xs mt-3 font-bold border border-slate-200" id="fan-status">สถานะ: ปิด 🔴</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 flex flex-col gap-4">
                <div class="flex items-center justify-center md:justify-start gap-3 px-2">
                    <span class="text-2xl md:text-3xl">🛠️</span>
                    <h2 class="text-xl md:text-2xl font-bold text-slate-700">ฟังก์ชันช่วยเหลือด่วน</h2>
                </div>
                <div class="grid grid-cols-2 gap-4 flex-1">
                    <button onclick="triggerFindItem()" class="col-span-2 glass-button active:scale-95 hover:-translate-y-1 p-4 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300 text-center">
                        <span class="text-4xl md:text-5xl mb-1 drop-shadow-sm">🔍</span>
                        <span class="text-lg md:text-xl font-extrabold text-slate-800">ระบบหาของพวงกุญแจ</span>
                    </button>

                    <button onclick="acknowledgeMed('morning')" class="glass-button active:scale-95 hover:-translate-y-1 p-4 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300 text-center border-2 border-transparent" id="btn-med-morning">
                        <span class="text-4xl md:text-5xl mb-2">☀️</span>
                        <span class="text-md md:text-lg font-extrabold text-slate-800 leading-tight">ตู้ยาเช้า</span>
                        <span class="text-slate-500 text-[10px] md:text-xs mt-1 font-bold" id="status-med-morning">ยังไม่มีเตือน</span>
                    </button>

                    <button onclick="acknowledgeMed('evening')" class="glass-button active:scale-95 hover:-translate-y-1 p-4 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300 text-center border-2 border-transparent" id="btn-med-evening">
                        <span class="text-4xl md:text-5xl mb-2">🌙</span>
                        <span class="text-md md:text-lg font-extrabold text-slate-800 leading-tight">ตู้ยาเย็น</span>
                        <span class="text-slate-500 text-[10px] md:text-xs mt-1 font-bold" id="status-med-evening">ยังไม่มีเตือน</span>
                    </button>

                    <button onclick="triggerSOS()" class="col-span-2 bg-gradient-to-r from-red-500 to-rose-600 text-white p-6 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300 shadow-[0_10px_25px_rgba(239,68,68,0.4)] active:scale-95 hover:-translate-y-1 border border-red-400">
                        <span class="text-5xl md:text-6xl mb-2 drop-shadow-md">🚨</span>
                        <span class="text-2xl md:text-3xl font-black tracking-wide drop-shadow-sm text-center">ส่งสัญญาณช่วยเหลือ</span>
                    </button>
                </div>
            </div>

        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD1pRA8LM0cisL6FTTLRLNp6e8mhGcE2lA",
            authDomain: "smarthome-elderly-6273a.firebaseapp.com",
            databaseURL: "https://smarthome-elderly-6273a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "smarthome-elderly-6273a",
            storageBucket: "smarthome-elderly-6273a.firebasestorage.app",
            messagingSenderId: "1066038258843",
            appId: "1:1066038258843:web:1033b3916b228a97a56a3e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentLight = 0; let currentWater = 0; let currentFan = 0;

        db.ref('WeCare').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            
            // อัปเดตอุปกรณ์ทั่วไป
            if(data.Light !== undefined) currentLight = data.Light;
            if(data.Pump !== undefined) currentWater = data.Pump;
            if(data.Fan !== undefined) currentFan = data.Fan;
            
            document.getElementById('light-status').innerHTML = currentLight === 1 ? "สถานะ: <span class='text-emerald-600'>เปิด 🟢</span>" : "สถานะ: <span class='text-slate-500'>ปิด 🔴</span>";
            document.getElementById('water-status').innerHTML = currentWater === 1 ? "สถานะ: <span class='text-emerald-600'>เปิด 🟢</span>" : "สถานะ: <span class='text-slate-500'>ปิด 🔴</span>";
            document.getElementById('fan-status').innerHTML = currentFan === 1 ? "สถานะ: <span class='text-sky-600'>เปิด 🟢</span>" : "สถานะ: <span class='text-slate-500'>ปิด 🔴</span>";

            // ☀️ อัปเดตตู้ยาเช้า
            const btnMorning = document.getElementById('btn-med-morning');
            const txtMorning = document.getElementById('status-med-morning');
            if(data.Med_Morning === 1) {
                btnMorning.className = "glass-button active:scale-95 hover:-translate-y-1 p-4 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300 text-center border-2 border-amber-500 bg-amber-50 animate-pulse";
                txtMorning.innerHTML = "<span class='text-amber-600 font-black'> ถึงเวลาทานยาเช้าแล้วจ้ะ! </span>";
            } else {
                btnMorning.className = "glass-button active:scale-95 hover:-translate-y-1 p-4 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300 text-center border-2 border-transparent";
                txtMorning.innerText = "ทานเรียบร้อยแล้ว ✅";
            }

            // 🌙 อัปเดตตู้ยาเย็น
            const btnEvening = document.getElementById('btn-med-evening');
            const txtEvening = document.getElementById('status-med-evening');
            if(data.Med_Evening === 1) {
                btnEvening.className = "glass-button active:scale-95 hover:-translate-y-1 p-4 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300 text-center border-2 border-indigo-500 bg-indigo-50 animate-pulse";
                txtEvening.innerHTML = "<span class='text-indigo-600 font-black'> ถึงเวลาทานยาเย็นแล้วจ้ะ! </span>";
            } else {
                btnEvening.className = "glass-button active:scale-95 hover:-translate-y-1 p-4 rounded-[2rem] flex flex-col items-center justify-center transition-all duration-300 text-center border-2 border-transparent";
                txtEvening.innerText = "ทานเรียบร้อยแล้ว ✅";
            }
        });

        function toggleDevice(device) {
            if(device === 'light') db.ref('WeCare').update({ Light: currentLight === 1 ? 0 : 1 });
            if(device === 'water') db.ref('WeCare').update({ Pump: currentWater === 1 ? 0 : 1 });
            if(device === 'fan') db.ref('WeCare').update({ Fan: currentFan === 1 ? 0 : 1 });
        }
        function acknowledgeMed(type) {
            if(type === 'morning') {
                db.ref('WeCare').update({ Med_Morning: 0 });
                alert("บันทึกแล้วจ้ะ ยาเช้าทานเรียบร้อยแล้ว เก่งมากครับยาย!");
            } else if(type === 'evening') {
                db.ref('WeCare').update({ Med_Evening: 0 });
                alert("บันทึกแล้วจ้ะ ยาเย็นทานเรียบร้อยแล้ว เก่งมากครับยาย!");
            }
        }
        function triggerSOS() { db.ref('WeCare').update({ SOS_From_Home: 1 }); document.getElementById('sos-sent-banner').classList.remove('hidden'); }
        function cancelSOS() { db.ref('WeCare').update({ SOS_From_Home: 0 }); document.getElementById('sos-sent-banner').classList.add('hidden'); }
        function triggerFindItem() { db.ref('WeCare').update({ Find_Item: 1 }); alert("พวงกุญแจกำลังส่งเสียงร้องจ้ะ!"); setTimeout(() => { db.ref('WeCare').update({ Find_Item: 0 }); }, 5000); }
    </script>
</body>
</html>
