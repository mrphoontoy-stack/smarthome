<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE CARE - Caregiver Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        @keyframes gradient-xy {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-xy {
            background-size: 400% 400%;
            animation: gradient-xy 15s ease infinite;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-200 via-blue-100 to-indigo-200 animate-gradient-xy p-4 min-h-screen text-slate-800 flex items-center justify-center">

    <div class="w-full max-w-7xl h-auto min-h-[90vh] glass-panel rounded-[2rem] md:rounded-[3rem] flex flex-col relative overflow-hidden my-4">
        
        <div id="sos-banner" class="hidden absolute inset-0 z-50 bg-red-600/95 backdrop-blur-lg text-white p-6 md:p-12 flex flex-col justify-center items-center text-center">
            <div class="text-7xl md:text-9xl mb-4 animate-bounce drop-shadow-2xl">🚨</div>
            <h2 class="text-4xl md:text-6xl font-black mb-4 tracking-wide drop-shadow-lg">แจ้งเตือนฉุกเฉิน!</h2>
            <p class="text-xl md:text-3xl font-medium mb-8 text-red-100">คุณยายกดส่งสัญญาณขอความช่วยเหลือด่วนจากที่บ้าน</p>
            <button onclick="clearSOS()" class="bg-white text-red-600 font-bold px-8 py-4 rounded-full text-xl md:text-3xl shadow-[0_10px_40px_rgba(255,255,255,0.3)] hover:bg-slate-100 transition-all duration-300">
                รับทราบและเคลียร์แจ้งเตือน
            </button>
        </div>

        <header class="p-6 md:px-10 flex flex-col md:flex-row items-center justify-between shrink-0 border-b border-white/50 bg-white/40 gap-6">
            <div class="flex flex-col md:flex-row items-center gap-4 text-center md:text-left">
                <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-slate-700 to-indigo-800 p-1 shadow-lg shrink-0">
                    <div class="w-full h-full bg-white rounded-full overflow-hidden flex justify-center items-center">
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Caregiver Avatar" class="w-full h-full object-cover">
                    </div>
                </div>
                <div>
                    <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-slate-800 to-indigo-900 drop-shadow-sm">WE CARE</h1>
                    <p class="text-slate-600 text-lg md:text-xl font-bold mt-1 flex items-center justify-center md:justify-start gap-2">
                        ศูนย์ควบคุมผู้ดูแล
                        <span class="text-xs bg-slate-800 text-slate-100 px-3 py-1 rounded-full font-bold shadow-sm border border-slate-700">v 1.3</span>
                    </p>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row items-center gap-4">
                <div class="flex items-center gap-3 bg-white/70 px-5 py-2.5 rounded-full border border-white shadow-sm">
                    <span class="relative flex h-4 w-4">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-500"></span>
                    </span>
                    <span class="text-slate-800 font-bold text-sm md:text-md">ระบบพร้อมเฝ้าระวัง</span>
                </div>
                <div class="flex gap-2">
                    <img src="3040_0.jpg" alt="KU KUSK" class="h-10 md:h-14 w-auto object-contain rounded-xl shadow-md border-2 border-white bg-white">
                    <img src="3039_0.jpg" alt="Robotics Playground" class="h-10 md:h-14 w-auto object-contain rounded-xl shadow-md border-2 border-white bg-white">
                </div>
            </div>
        </header>

        <main class="flex-1 p-4 md:p-8 flex flex-col lg:flex-row gap-8">
            
            <div class="flex-1 flex flex-col gap-4">
                <div class="flex items-center justify-center md:justify-start gap-3 px-2">
                    <span class="text-2xl md:text-3xl drop-shadow-sm">📲</span>
                    <h2 class="text-xl md:text-2xl font-bold text-slate-800">แผงสั่งการระยะไกล</h2>
                </div>
                
                <div class="grid grid-cols-1 gap-4 flex-1">
                    <button onclick="sendMedReminder('morning')" class="glass-button active:scale-95 hover:-translate-y-1 p-4 rounded-[2rem] flex flex-col sm:flex-row items-center text-center sm:text-left gap-4 transition-all duration-300">
                        <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center shrink-0 shadow-inner"><span class="text-4xl">☀️</span></div>
                        <div>
                            <span class="block text-xl font-extrabold text-slate-800">ส่งสัญญาณเตือน "ยาเช้า"</span>
                            <span class="block text-amber-600 font-semibold text-xs">เปิดไฟและเสียงเตือนมื้อเช้า</span>
                        </div>
                    </button>
                    
                    <button onclick="sendMedReminder('evening')" class="glass-button active:scale-95 hover:-translate-y-1 p-4 rounded-[2rem] flex flex-col sm:flex-row items-center text-center sm:text-left gap-4 transition-all duration-300">
                        <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center shrink-0 shadow-inner"><span class="text-4xl">🌙</span></div>
                        <div>
                            <span class="block text-xl font-extrabold text-slate-800">ส่งสัญญาณเตือน "ยาเย็น"</span>
                            <span class="block text-indigo-600 font-semibold text-xs">เปิดไฟและเสียงเตือนมื้อเย็น</span>
                        </div>
                    </button>
                    
                    <button onclick="triggerFindItem()" class="glass-button active:scale-95 hover:-translate-y-1 p-4 rounded-[2rem] flex flex-col sm:flex-row items-center text-center sm:text-left gap-4 transition-all duration-300">
                        <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center shrink-0 shadow-inner"><span class="text-4xl">🔍</span></div>
                        <div>
                            <span class="block text-xl font-extrabold text-slate-800">ช่วยคุณยายหาของ</span>
                            <span class="block text-blue-600 font-semibold text-xs">ส่งเสียงเตือนที่พวงกุญแจ</span>
                        </div>
                    </button>
                </div>
            </div>

            <div class="flex-1 flex flex-col gap-4">
                <div class="flex items-center justify-center md:justify-start gap-3 px-2">
                    <span class="text-2xl md:text-3xl drop-shadow-sm">📊</span>
                    <h2 class="text-xl md:text-2xl font-bold text-slate-800">ระบบมอนิเตอร์สถานะ</h2>
                </div>

                <div class="flex-1 flex flex-col gap-4">
                    <div id="card-med-morning" class="bg-white/80 border border-white shadow-lg p-5 rounded-[2rem] flex flex-col items-center justify-center text-center transition-all duration-500">
                        <span id="icon-med-morning" class="text-4xl mb-1">✅</span>
                        <h3 id="title-med-morning" class="text-xl font-extrabold text-slate-800">ยาเช้า: ปกติ</h3>
                        <p id="desc-med-morning" class="text-slate-500 font-semibold text-sm">คุณยายทานยาเรียบร้อยแล้ว</p>
                    </div>

                    <div id="card-med-evening" class="bg-white/80 border border-white shadow-lg p-5 rounded-[2rem] flex flex-col items-center justify-center text-center transition-all duration-500">
                        <span id="icon-med-evening" class="text-4xl mb-1">✅</span>
                        <h3 id="title-med-evening" class="text-xl font-extrabold text-slate-800">ยาเย็น: ปกติ</h3>
                        <p id="desc-med-evening" class="text-slate-500 font-semibold text-sm">คุณยายทานยาเรียบร้อยแล้ว</p>
                    </div>

                    <div class="bg-gradient-to-br from-emerald-50 to-emerald-100 border border-emerald-200 shadow-lg p-5 rounded-[2rem] flex flex-col items-center justify-center text-center relative overflow-hidden">
                        <span class="text-4xl mb-1">🛡️</span>
                        <h3 class="text-xl font-extrabold text-emerald-800">ระบบเฝ้าระวังปกติ</h3>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD1pRA8LM0cisL6FTTLRLNp6e8mhGcE2lA",
            authDomain: "smarthome-elderly-6273a.firebaseapp.com",
            databaseURL: "https://smarthome-elderly-6273a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "smarthome-elderly-6273a",
            storageBucket: "smarthome-elderly-6273a.firebasestorage.app",
            messagingSenderId: "1066038258843",
            appId: "1:1066038258843:web:1033b3916b228a97a56a3e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('WeCare').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            // SOS แจ้งเตือนภัย
            if(data.SOS_From_Home === 1) { document.getElementById('sos-banner').classList.remove('hidden'); playSiren(); } 
            else { document.getElementById('sos-banner').classList.add('hidden'); }

            // ☀️ มอนิเตอร์ยาเช้า
            const cMorning = document.getElementById('card-med-morning');
            if(data.Med_Morning === 1) {
                cMorning.className = "bg-gradient-to-br from-amber-100 to-yellow-50 border border-amber-300 shadow-md p-5 rounded-[2rem] flex flex-col items-center justify-center text-center animate-pulse";
                document.getElementById('icon-med-morning').innerText = "⏳";
                document.getElementById('title-med-morning').innerText = "เตือนยาเช้า: รอยายทานยา";
                document.getElementById('desc-med-morning').innerText = "ตู้ยากำลังส่งสัญญาณไฟ/เสียงเตือน";
            } else {
                cMorning.className = "bg-white/80 border border-white shadow-lg p-5 rounded-[2rem] flex flex-col items-center justify-center text-center";
                document.getElementById('icon-med-morning').innerText = "✅";
                document.getElementById('title-med-morning').innerText = "ยาเช้า: ทานแล้ว";
                document.getElementById('desc-med-morning').innerText = "คุณยายกดยืนยันทานยาเรียบร้อย";
            }

            // 🌙 มอนิเตอร์ยาเย็น
            const cEvening = document.getElementById('card-med-evening');
            if(data.Med_Evening === 1) {
                cEvening.className = "bg-gradient-to-br from-indigo-100 to-purple-50 border border-indigo-300 shadow-md p-5 rounded-[2rem] flex flex-col items-center justify-center text-center animate-pulse";
                document.getElementById('icon-med-evening').innerText = "⏳";
                document.getElementById('title-med-evening').innerText = "เตือนยาเย็น: รอยายทานยา";
                document.getElementById('desc-med-evening').innerText = "ตู้ยากำลังส่งสัญญาณไฟ/เสียงเตือน";
            } else {
                cEvening.className = "bg-white/80 border border-white shadow-lg p-5 rounded-[2rem] flex flex-col items-center justify-center text-center";
                document.getElementById('icon-med-evening').innerText = "✅";
                document.getElementById('title-med-evening').innerText = "ยาเย็น: ทานแล้ว";
                document.getElementById('desc-med-evening').innerText = "คุณยายกดยืนยันทานยาเรียบร้อย";
            }
        });

        function sendMedReminder(type) {
            if(type === 'morning') { db.ref('WeCare').update({ Med_Morning: 1 }); alert("ส่งสัญญาณเตือนยาเช้าแล้ว!"); }
            if(type === 'evening') { db.ref('WeCare').update({ Med_Evening: 1 }); alert("ส่งสัญญาณเตือนยาเย็นแล้ว!"); }
        }
        function triggerFindItem() { db.ref('WeCare').update({ Find_Item: 1 }); alert("ส่งสัญญาณหาของแล้ว!"); setTimeout(() => { db.ref('WeCare').update({ Find_Item: 0 }); }, 5000); }
        function clearSOS() { db.ref('WeCare').update({ SOS_From_Home: 0 }); }
        function playSiren() { let audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'); audio.play().catch(e => console.log("รอเปิดสิทธิ์เสียง")); }
    </script>
</body>
</html>
