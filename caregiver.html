<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE CARE - Caregiver Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        @keyframes gradient-xy {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-xy {
            background-size: 400% 400%;
            animation: gradient-xy 15s ease infinite;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-200 via-blue-100 to-indigo-200 animate-gradient-xy p-4 md:p-8 flex justify-center items-center h-screen overflow-hidden text-slate-800">

    <div class="w-full max-w-7xl h-[90vh] glass-panel rounded-[3rem] flex flex-col relative overflow-hidden">
        
        <div id="sos-banner" class="hidden absolute inset-0 z-50 bg-red-600/90 backdrop-blur-lg text-white p-12 flex flex-col justify-center items-center text-center">
            <div class="text-9xl mb-6 animate-bounce drop-shadow-2xl">🚨</div>
            <h2 class="text-6xl font-black mb-6 tracking-wide drop-shadow-lg">แจ้งเตือนฉุกเฉิน!</h2>
            <p class="text-3xl font-medium mb-12 text-red-100">คุณยายกดส่งสัญญาณขอความช่วยเหลือด่วนจากที่บ้าน</p>
            <button onclick="clearSOS()" class="bg-white text-red-600 font-bold px-12 py-5 rounded-full text-3xl shadow-[0_10px_40px_rgba(255,255,255,0.3)] hover:bg-slate-100 hover:scale-105 transition-all duration-300">
                รับทราบและเคลียร์แจ้งเตือน
            </button>
        </div>

        <header class="p-6 md:px-10 flex items-center justify-between shrink-0 border-b border-white/50 bg-white/40">
            <div class="flex items-center gap-6">
                <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-slate-700 to-indigo-800 p-1 shadow-lg shrink-0">
                    <div class="w-full h-full bg-white rounded-full overflow-hidden flex justify-center items-center">
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Caregiver Avatar" class="w-full h-full object-cover">
                    </div>
                </div>
                <div>
                    <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-slate-800 to-indigo-900 drop-shadow-sm">WE CARE</h1>
                    <p class="text-slate-600 text-xl font-bold mt-1 flex items-center gap-2">
                        ศูนย์ควบคุมผู้ดูแล: คุณต้น
                        <span class="text-xs bg-slate-800 text-slate-100 px-3 py-1 rounded-full font-bold shadow-sm border border-slate-700">v 1.1</span>
                    </p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden md:flex items-center gap-3 bg-white/70 px-5 py-2.5 rounded-full border border-white shadow-sm">
                    <span class="relative flex h-4 w-4">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-500"></span>
                    </span>
                    <span class="text-slate-800 font-bold text-md">ระบบพร้อมเฝ้าระวัง</span>
                </div>
                <div class="flex gap-2">
                    <img src="3040_0.jpg" alt="KU KUSK" class="h-14 w-auto object-contain rounded-xl shadow-md border-2 border-white bg-white">
                    <img src="3039_0.jpg" alt="Robotics Playground" class="h-14 w-auto object-contain rounded-xl shadow-md border-2 border-white bg-white">
                </div>
            </div>
        </header>

        <main class="flex-1 p-8 flex gap-8 overflow-hidden">
            
            <div class="flex-1 flex flex-col gap-4">
                <div class="flex items-center gap-3 px-2">
                    <span class="text-3xl drop-shadow-sm">📲</span>
                    <h2 class="text-2xl font-bold text-slate-800">แผงสั่งการระยะไกล</h2>
                </div>
                
                <div class="grid grid-cols-1 gap-6 flex-1">
                    <button onclick="sendMedReminder()" class="glass-button hover:-translate-y-2 p-6 rounded-[2.5rem] flex items-center gap-6 transition-all duration-300 group">
                        <div class="w-24 h-24 bg-rose-100 rounded-full flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform shadow-inner">
                            <span class="text-6xl">💊</span>
                        </div>
                        <div class="text-left">
                            <span class="block text-3xl font-extrabold text-slate-800 mb-1">ส่งเตือนให้ยายทานยา</span>
                            <span class="block text-rose-600 font-semibold bg-rose-50 inline-block px-3 py-1 rounded-lg border border-rose-100">สั่งเปิดไฟและเสียงที่ตู้ยา</span>
                        </div>
                    </button>
                    
                    <button onclick="triggerFindItem()" class="glass-button hover:-translate-y-2 p-6 rounded-[2.5rem] flex items-center gap-6 transition-all duration-300 group">
                        <div class="w-24 h-24 bg-indigo-100 rounded-full flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform shadow-inner">
                            <span class="text-6xl">🔍</span>
                        </div>
                        <div class="text-left">
                            <span class="block text-3xl font-extrabold text-slate-800 mb-1">ช่วยคุณยายหาของ</span>
                            <span class="block text-indigo-600 font-semibold bg-indigo-50 inline-block px-3 py-1 rounded-lg border border-indigo-100">ส่งเสียงเตือนที่พวงกุญแจ</span>
                        </div>
                    </button>
                </div>
            </div>

            <div class="flex-1 flex flex-col gap-4">
                <div class="flex items-center gap-3 px-2">
                    <span class="text-3xl drop-shadow-sm">📊</span>
                    <h2 class="text-2xl font-bold text-slate-800">ระบบมอนิเตอร์สถานะ</h2>
                </div>

                <div class="flex-1 flex flex-col gap-6">
                    <div id="med-status-card" class="bg-white/80 border border-white shadow-lg p-8 rounded-[2.5rem] flex flex-col items-center justify-center transition-all duration-500 relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-br from-transparent to-slate-100/50"></div>
                        <span id="med-icon" class="text-7xl mb-4 drop-shadow-md z-10">✅</span>
                        <h3 id="med-title" class="text-3xl font-extrabold text-slate-800 mb-2 z-10">สถานะการทานยาปกติ</h3>
                        <p id="med-desc" class="text-slate-600 font-semibold text-lg z-10 bg-white/50 px-4 py-1 rounded-full">ยังไม่ถึงเวลา หรือทานเรียบร้อยแล้ว</p>
                    </div>

                    <div class="bg-gradient-to-br from-emerald-50 to-emerald-100 border border-emerald-200 shadow-lg p-8 rounded-[2.5rem] flex flex-col items-center justify-center flex-1 relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-200 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-pulse"></div>
                        <span class="text-7xl mb-4 drop-shadow-md z-10">🛡️</span>
                        <h3 class="text-3xl font-extrabold text-emerald-800 mb-2 z-10">ระบบเฝ้าระวังทำงานปกติ</h3>
                        <p class="text-emerald-700 font-semibold text-lg z-10 bg-emerald-100/50 px-4 py-1 rounded-full">Standby รอรับสัญญาณฉุกเฉิน</p>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD1pRA8LM0 ক্রমশ0cisL6FTTLRLNp6e8mhGcE2lA",
            authDomain: "smarthome-elderly-6273a.firebaseapp.com",
            databaseURL: "https://smarthome-elderly-6273a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "smarthome-elderly-6273a",
            storageBucket: "smarthome-elderly-6273a.firebasestorage.app",
            messagingSenderId: "1066038258843",
            appId: "1:1066038258843:web:1033b3916b228a97a56a3e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('WeCare').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            const sosBanner = document.getElementById('sos-banner');
            if(data.SOS_From_Home === 1) {
                sosBanner.classList.remove('hidden'); 
                playSiren();
            } else {
                sosBanner.classList.add('hidden'); 
            }

            const medCard = document.getElementById('med-status-card');
            const medIcon = document.getElementById('med-icon');
            const medTitle = document.getElementById('med-title');
            const medDesc = document.getElementById('med-desc');

            if(data.Med_Alert === 1) {
                medCard.className = "bg-gradient-to-br from-amber-100 to-yellow-50 border border-amber-300 shadow-[0_0_30px_rgba(251,191,36,0.4)] p-8 rounded-[2.5rem] flex flex-col items-center justify-center transition-all duration-500 animate-pulse relative overflow-hidden";
                medIcon.innerText = "⏳";
                medTitle.innerText = "รอคุณยายทานยา...";
                medTitle.className = "text-3xl font-extrabold text-amber-800 mb-2 z-10";
                medDesc.innerText = "กำลังเปิดสัญญาณไฟเตือนที่ตู้ยา";
                medDesc.className = "text-amber-700 font-semibold text-lg z-10 bg-amber-200/50 px-4 py-1 rounded-full";
            } else {
                medCard.className = "bg-white/80 border border-white shadow-lg p-8 rounded-[2.5rem] flex flex-col items-center justify-center transition-all duration-500 relative overflow-hidden";
                medIcon.innerText = "✅";
                medTitle.innerText = "สถานะการทานยาปกติ";
                medTitle.className = "text-3xl font-extrabold text-slate-800 mb-2 z-10";
                medDesc.innerText = "ยังไม่ถึงเวลา หรือทานเรียบร้อยแล้ว";
                medDesc.className = "text-slate-600 font-semibold text-lg z-10 bg-white/50 px-4 py-1 rounded-full";
            }
        });

        function sendMedReminder() {
            db.ref('WeCare').update({ Med_Alert: 1 });
            alert("ส่งสัญญาณเตือนไปที่ตู้ยาคุณยายแล้วครับ!");
        }
        function triggerFindItem() {
            db.ref('WeCare').update({ Find_Item: 1 });
            alert("ส่งเสียงเตือนหาของแล้วครับ!");
            setTimeout(() => { db.ref('WeCare').update({ Find_Item: 0 }); }, 5000);
        }
        function clearSOS() {
            db.ref('WeCare').update({ SOS_From_Home: 0 });
        }
        function playSiren() {
            let audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
            audio.play().catch(e => console.log("รอการคลิกหน้าจอ"));
        }
    </script>
</body>
</html>
